# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '11'
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }} # Value of the GPG private key to import

    - name: Prime GPG Agent
      run: echo "priming GPG agent" | gpg --batch --status-fd 1 --pinentry-mode loopback --passphrase "${{ secrets.MAVEN_GPG_PASSPHRASE }}" --clearsign > /dev/null

    - name: Build with Maven
      run: mvn -ntp -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn -ntp -B deploy -P release-github
      env:
        GITHUB_TOKEN: ${{ github.token }} # GITHUB_TOKEN is the default env for the password

    - name: Set up Apache Maven Central
      uses: actions/setup-java@v5
      with: # running setup-java again overwrites the settings.xml
        distribution: 'temurin'
        java-version: '11'
        server-id: central
        server-username: MAVEN_USERNAME # env variable for username in deploy
        server-password: MAVEN_CENTRAL_TOKEN # env variable for token in deploy

    - name: Publish to Apache Maven Central
      run: mvn -ntp -B deploy -P release-central
      env:
        MAVEN_USERNAME: ${{ secrets.OSS_SONATYPE_USERNAME }}
        MAVEN_CENTRAL_TOKEN: ${{ secrets.OSS_SONATYPE_PASSWORD }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # This grabs the JAR, POM, and ASC (signature) files from the target folder
        files: |
          target/*.jar
          target/*.pom
          target/*.asc
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true # Automatically summarizes your commits
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
